<!DOCTYPE html>
<html lang="en">
<head>
    <title>XYZ Travel Agency | About Us</title>
    <meta name="description" content="Explore Nepal with XYZ Travel Agency in Kathmandu. We offer expert-guided trekking, cultural tours, and custom Nepal holiday packages.">
    <meta name="keywords" content="travel agency Kathmandu, Nepal trekking, Kathmandu tours, XYZ travel agency">
    <meta name="author" content="XYZ Travel Agency">

    <style>
        body { 
            font-family: Arial, sans-serif; 
            line-height: 1.3;
            margin:0;
            background-color: #f4f7f6; /* Added background color to see white form */
        }

        .form {
            max-width : 400px;
            background: white;
            margin: 30px auto;
            border-radius: 9px;
            /* FIXED: Removed space in '11px' and fixed rgba syntax */
            box-shadow: 0 3px 11px rgba(0,0,0,0.1); 
            padding: 20px; /* Added internal padding so fields don't touch the edge */
        }

        /* Added input styling so form fields aren't squished */
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        /* Added button styling so it fills the form width */
        button {
            width: 100%;
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            color: #555; /* Darkened slightly for readability */
        }
        
        button:hover {
            background-color: #004085;
        }

        h2 {
            text-align: center;
            color: #0056b3; margin-top: 0;
        }

        header {
            background-color: #0056b3; /* Changed from transparent color for visibility */
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            max-width : 500px; /* FIXED: Increased from 300px to fit the 400px form */
            margin: 30px auto;
            padding : 10px 30px;
            padding-bottom: 80px; /* Prevents fixed footer overlap */
        }

        footer {
            background-color: #222;
            color : white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <div>
    <header>
        <h1>XYZ Travel Agency</h1>
        <p> Your Gateway to Nepal Exploration</p>
    </header></div>

    <div>
    <main>
        <div class ="form">
            <h2>Create Your Account</h2>
            <form action = "#" method = "POST">
            
                <div>
                    <label for="name">Full Name</label>
                    <input type = "text" id="name" name="name" placeholder="Adrian Kandel" required>
                </div>
                
                <div>
                    <label for="address">Address</label>
                    <input type = "text" id="address" name="address" placeholder="Harisiddhi, Lalitpur, Nepal" required>
                </div>
                
                <div>
                    <label for="email">Email Address</label>
                    <input type = "email" id="email" name="email" placeholder="kandeladri@gmail.com" required>
                </div>
                
                <div>
                    <label for="dob">Date of Birth</label>
                    <input type = "date" id="dob" name="dob" required>
                </div>
                
                <button type="submit">Register </button>
                
            </form> 
        </div>
    </main></div>
        
    <div>
    <footer>
        <p>&copy; 2026 XYZ Travel Agency, Kathmandu, Nepal. All Rights Reserved.</p>
    </footer></div>
    
</body>
</html>
